server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

services:
  register-adm:
    url: ${REGISTER_ADM_SERVICE_URL:http://register-adm-service:8084}

bootstrap:
  admin:
    name: ${ADMIN_NAME:Administrador Local}
    email: ${ADMIN_EMAIL:admin@local.test}
    password: ${ADMIN_PASSWORD:admin123}
